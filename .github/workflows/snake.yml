name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: tbzlucas
          outputs: |
            dist/github-snake.svg?color_snake=%2300d4ff&color_dots=%230d1117,%23004d5c,%23008db3,%2300b8e6,%2300d4ff
            dist/github-snake-dark.svg?color_snake=%2300d4ff&color_dots=%230d1117,%23004d5c,%23008db3,%2300b8e6,%2300d4ff&palette=github-dark
            dist/github-snake-glow.gif?color_snake=%2300d4ff&color_dots=%230d1117,%23004d5c,%23008db3,%2300b8e6,%2300d4ff&palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
