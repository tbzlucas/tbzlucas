<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 900" width="820" height="900" role="img" aria-label="Lucas Tassi - progression timeline by age">
  <defs>
    <style>
      .age { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
      .body { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; }
      .meta { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <rect width="820" height="900" fill="#0A0A0B"/>

  <line x1="90" y1="60" x2="90" y2="840" stroke="#141416" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="840" stroke="#22D3EE" stroke-width="2" stroke-dasharray="780" stroke-dashoffset="780">
    <animate attributeName="stroke-dashoffset" values="780;0;0;780" keyTimes="0;0.55;0.9;1" dur="13s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
  </line>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.060;0.110;0.92;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="110" r="6" fill="#22D3EE"/>
    <text x="140" y="102" class="age" font-size="46" fill="#141416" stroke="#8A8A8F" stroke-width="0.5" opacity="0.55">12</text>
    <text x="146" y="124" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="100" class="title" font-size="19" fill="#F5F4F2">Scratch</text>
    <text x="260" y="124" class="body" font-size="14" fill="#8A8A8F">First logic. Blocks, not text.</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.193;0.243;0.92;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="230" r="6" fill="#22D3EE"/>
    <text x="140" y="222" class="age" font-size="46" fill="#141416" stroke="#8A8A8F" stroke-width="0.5" opacity="0.55">14</text>
    <text x="146" y="244" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="220" class="title" font-size="19" fill="#F5F4F2">Vibe coding on Replit</text>
    <text x="260" y="244" class="body" font-size="14" fill="#8A8A8F">First real builds.</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.327;0.377;0.92;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="350" r="6" fill="#22D3EE"/>
    <text x="140" y="342" class="age" font-size="46" fill="#141416" stroke="#8A8A8F" stroke-width="0.5" opacity="0.55">16</text>
    <text x="146" y="364" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="340" class="title" font-size="19" fill="#F5F4F2">Chrome and local extensions</text>
    <text x="260" y="364" class="body" font-size="14" fill="#8A8A8F">Shipping tools people install.</text>
    <text x="260" y="384" class="body" font-size="14" fill="#8A8A8F">Coding research project for the University of Cincinnati.</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.460;0.510;0.92;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="490" r="6" fill="#22D3EE"/>
    <text x="140" y="482" class="age" font-size="46" fill="#141416" stroke="#8A8A8F" stroke-width="0.5" opacity="0.55">17</text>
    <text x="146" y="504" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="480" class="title" font-size="19" fill="#F5F4F2">Full websites, front to back</text>
    <text x="260" y="504" class="body" font-size="14" fill="#8A8A8F">Live and shipped.</text>
    <text x="260" y="524" class="body" font-size="14" fill="#8A8A8F">Security research on online casinos with friends.</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.593;0.643;0.92;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="630" r="6" fill="#22D3EE"/>
    <text x="140" y="622" class="age" font-size="46" fill="#141416" stroke="#8A8A8F" stroke-width="0.5" opacity="0.55">18</text>
    <text x="146" y="644" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="620" class="title" font-size="19" fill="#F5F4F2">Bots, agents, and games</text>
    <text x="260" y="644" class="body" font-size="14" fill="#8A8A8F">Telegram bots, automated agents, security research.</text>
    <text x="260" y="664" class="body" font-size="14" fill="#8A8A8F">Roblox game and web app games, truly live.</text>
    <text x="260" y="684" class="body" font-size="14" fill="#8A8A8F">Automated trading bots for Kalshi and Polymarket.</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.727;0.777;1" dur="13s" repeatCount="indefinite"/>
    <circle cx="90" cy="800" r="14" fill="none" stroke="#22D3EE" stroke-width="2">
      <animate attributeName="r" values="8;16;8" dur="2.4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="800" r="7" fill="#22D3EE"/>
    <text x="140" y="792" class="age" font-size="46" fill="#22D3EE" opacity="0.85">19</text>
    <text x="146" y="814" class="meta" font-size="11" fill="#8A8A8F" letter-spacing="2">YEARS OLD</text>
    <text x="260" y="790" class="title" font-size="19" fill="#F5F4F2">Computer Science, University of Bristol</text>
    <text x="260" y="814" class="body" font-size="14" fill="#22D3EE">Incoming.</text>
  </g>
</svg>
